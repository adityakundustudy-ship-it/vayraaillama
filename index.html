<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAYRA AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100dvh; overflow: hidden; }
        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none !important; }
        #sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; transform: translateX(-100%); transition: 0.3s ease; z-index: 100; background: #0a0a0a; border-right: 1px solid #3b82f6; }
        #sidebar.open { transform: translateX(0); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">
    <div id="particles-js"></div>

    <aside id="sidebar" class="flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold italic text-blue-500">ARCHIVE</h2>
            <button onclick="document.getElementById('sidebar').classList.remove('open')" class="text-zinc-500 text-3xl">&times;</button>
        </div>
        
        <button onclick="startNewChat()" class="w-full py-3 mb-6 bg-blue-600/20 border border-blue-500/40 rounded-xl text-blue-400 font-bold text-xs tracking-widest hover:bg-blue-600 hover:text-white transition-all">+ NEW SESSION</button>
        
        <div id="history-content" class="flex-1 overflow-y-auto space-y-3 text-[10px] text-zinc-400 uppercase tracking-widest">
            </div>
        <button onclick="supabaseClient.auth.signOut().then(() => location.reload())" class="mt-4 p-3 border border-red-900 text-red-500 text-[10px] font-bold rounded-xl">LOGOUT</button>
    </aside>

    <div id="login-wall" class="fixed inset-0 z-[110] bg-black flex items-center justify-center p-6">
        <div class="glass p-12 rounded-[3rem] w-full max-w-sm text-center">
            <h1 class="text-5xl font-black italic text-blue-500 mb-2">VAYRA</h1>
            <p class="text-zinc-600 text-[10px] mb-12 tracking-[0.4em]">AUTHENTICATION REQUIRED</p>
            <button onclick="loginWithGoogle()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl">CONTINUE WITH GOOGLE</button>
        </div>
    </div>

    <div id="main-app" class="hidden relative z-10 flex flex-col h-full w-full p-4">
        <header class="flex justify-between items-center py-4 px-2">
            <button onclick="document.getElementById('sidebar').classList.add('open')" class="p-3 glass rounded-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <h1 class="text-2xl font-black italic text-blue-500">VAYRA.AI</h1>
            <div class="w-10"></div>
        </header>

        <main id="chat-box" class="flex-1 glass rounded-[2.5rem] p-6 overflow-y-auto my-2 flex flex-col gap-5">
            <div class="bg-blue-600/10 border border-blue-500/10 p-5 rounded-3xl self-start max-w-[85%] text-xs italic">
                System Initialized. Awaiting inquiry.
            </div>
        </main>

        <div class="pb-6 px-1">
            <div class="relative flex items-center">
                <input id="user-input" type="text" class="w-full bg-zinc-900 glass rounded-2xl p-5 pr-16 text-white text-sm" placeholder="Message Vayra...">
                <button onclick="sendMessage()" class="absolute right-2 bg-blue-600 p-3 rounded-xl">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 🔑 PASTE KEYS ---
        const SB_URL = "https://xwdtnknxuyleggfcwszi.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3ZHRua254dXlsZWdnZmN3c3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTE2MTIsImV4cCI6MjA5MDI4NzYxMn0.llSLHGvzXXg0Ti3Cls4Tt5ksmHgjSsUHSDDBJyvLzU0"; 
        const GR_KEY = "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";

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        let currentSessionId = Date.now().toString(); // Creates a unique ID for every session

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('login-wall').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                refreshSidebar(user.id);
            }
        }

        async function loginWithGoogle() {
            await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
        }

        function startNewChat() {
            document.getElementById('chat-box').innerHTML = '<div class="bg-blue-600/10 border border-blue-500/10 p-5 rounded-3xl self-start max-w-[85%] text-xs italic">New session started.</div>';
            currentSessionId = Date.now().toString();
            document.getElementById('sidebar').classList.remove('open');
        }

        async function refreshSidebar(uid) {
            // Get unique session IDs
            const { data } = await supabaseClient.from('chat_history').select('session_id, content').eq('user_id', uid).eq('role', 'user').order('created_at', {ascending: false});
            const list = document.getElementById('history-content');
            
            // Filter to show only the first message of each unique session
            const uniqueSessions = [];
            const seen = new Set();
            if(data) data.forEach(item => {
                if(!seen.has(item.session_id)) {
                    uniqueSessions.push(item);
                    seen.add(item.session_id);
                }
            });

            list.innerHTML = uniqueSessions.map(s => `
                <div onclick="loadSession('${s.session_id}')" class="p-4 bg-zinc-900/50 rounded-2xl border border-white/5 truncate active:bg-blue-900/20 transition-all cursor-pointer">
                    ${s.content}
                </div>
            `).join('') || "No archives.";
        }

        async function loadSession(sid) {
            currentSessionId = sid;
            const { data } = await supabaseClient.from('chat_history').select('*').eq('session_id', sid).order('created_at', {ascending: true});
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            if(data) data.forEach(m => appendMsg(m.role, m.content));
            document.getElementById('sidebar').classList.remove('open');
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const txt = input.value.trim();
            if (!txt) return;

            const { data: { user } } = await supabaseClient.auth.getUser();
            appendMsg('user', txt);
            input.value = '';

            await supabaseClient.from('chat_history').insert([{ user_id: user.id, role: 'user', content: txt, session_id: currentSessionId }]);

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GR_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: txt }] })
                });
                const d = await res.json();
                const reply = d.choices[0].message.content;
                appendMsg('assistant', reply);
                await supabaseClient.from('chat_history').insert([{ user_id: user.id, role: 'assistant', content: reply, session_id: currentSessionId }]);
                refreshSidebar(user.id);
            } catch (e) { appendMsg('assistant', "SYNC_ERROR"); }
        }

        function appendMsg(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = role === 'user' ? "bg-blue-600 p-5 rounded-[2rem] self-end max-w-[85%] text-sm" : "bg-zinc-900/60 p-6 rounded-[2rem] self-start max-w-[85%] text-sm border border-white/5";
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        particlesJS("particles-js", {"particles":{"number":{"value":40},"color":{"value":"#3b82f6"},"line_linked":{"enable":true,"opacity":0.1},"move":{"enable":true,"speed":1}}});
        window.onload = checkUser;
        document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
