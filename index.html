<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAYRA AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none !important; }
        #sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; transform: translateX(-100%); transition: 0.3s ease; z-index: 100; background: #0a0a0a; border-right: 1px solid #3b82f6; }
        #sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="flex flex-col">
    <div id="particles-js"></div>

    <aside id="sidebar" class="flex flex-col p-6">
        <h2 class="text-xl font-bold italic text-blue-500 mb-10">ARCHIVE</h2>
        <div id="history-content" class="flex-1 overflow-y-auto text-xs text-zinc-500 italic">No logs found.</div>
        <button onclick="location.reload()" class="mt-4 p-3 border border-zinc-800 rounded-xl text-[10px] uppercase tracking-widest">Reload App</button>
    </aside>

    <div id="login-wall" class="fixed inset-0 z-[110] bg-black flex items-center justify-center p-6">
        <div class="glass p-12 rounded-[3rem] w-full max-w-sm text-center">
            <h1 class="text-5xl font-black italic text-blue-500 mb-2">VAYRA</h1>
            <p class="text-zinc-600 text-[10px] mb-12 tracking-[0.4em]">CONNECT TO NETWORK</p>
            <button id="auth-btn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95">
                AUTHENTICATE
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden relative z-10 flex flex-col h-full w-full p-4">
        <header class="flex justify-between items-center py-4 px-2">
            <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="p-3 glass rounded-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <h1 class="text-2xl font-black italic text-blue-500">VAYRA</h1>
            <div class="w-10"></div>
        </header>
        <main id="chat-box" class="flex-1 glass rounded-[2.5rem] p-6 overflow-y-auto my-4 flex flex-col gap-5"></main>
        <div class="pb-6 relative">
            <input id="user-input" type="text" class="w-full bg-zinc-900 glass rounded-2xl p-5 pr-16 text-white text-sm" placeholder="Enter command...">
            <button onclick="sendMessage()" class="absolute right-2 top-2 bg-blue-600 p-3 rounded-xl shadow-lg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
    </div>

    <script>
        // 1. ADD YOUR KEYS HERE
        const SB_URL = "https://xwdtnknxuyleggfcwszi.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3ZHRua254dXlsZWdnZmN3c3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTE2MTIsImV4cCI6MjA5MDI4NzYxMn0.llSLHGvzXXg0Ti3Cls4Tt5ksmHgjSsUHSDDBJyvLzU0";
        const GR_KEY = "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";

        let supabase;

        window.onload = () => {
            // Initializing Particles
            particlesJS("particles-js", {"particles":{"number":{"value":30},"color":{"value":"#3b82f6"},"line_linked":{"enable":true,"opacity":0.1},"move":{"enable":true,"speed":1}}});
            
            // Wait for libraries to be ready
            setTimeout(() => {
                try {
                    supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    setupAuth();
                    checkSession();
                } catch (e) {
                    console.error("Initialization failed", e);
                }
            }, 1000);
        };

        function setupAuth() {
            const btn = document.getElementById('auth-btn');
            btn.addEventListener('click', async () => {
                btn.innerText = "REDIRECTING...";
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.origin }
                });
                if (error) {
                    alert(error.message);
                    btn.innerText = "AUTHENTICATE";
                }
            });
        }

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('login-wall').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadHistory(session.user.id);
            }
        }

        async function loadHistory(uid) {
            const { data } = await supabase.from('chat_history').select('*').eq('user_id', uid).order('created_at', {ascending: false}).limit(5);
            if (data) {
                document.getElementById('history-content').innerHTML = data.filter(m => m.role === 'user').map(m => `
                    <div class="p-3 bg-zinc-900 rounded-xl mb-2 truncate">${m.content}</div>
                `).join('');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const txt = input.value.trim();
            if (!txt) return;

            appendMsg('user', txt);
            input.value = '';
            
            const { data: { user } } = await supabase.auth.getUser();
            await supabase.from('chat_history').insert([{ user_id: user.id, role: 'user', content: txt }]);

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GR_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: txt }] })
                });
                const d = await res.json();
                const reply = d.choices[0].message.content;
                appendMsg('assistant', reply);
                await supabase.from('chat_history').insert([{ user_id: user.id, role: 'assistant', content: reply }]);
                loadHistory(user.id);
            } catch (e) { appendMsg('assistant', "OFFLINE_ERROR"); }
        }

        function appendMsg(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = role === 'user' ? "bg-blue-600 p-4 rounded-2xl self-end max-w-[85%] text-sm" : "bg-zinc-900 p-5 rounded-2xl self-start max-w-[85%] text-sm border border-zinc-800";
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
